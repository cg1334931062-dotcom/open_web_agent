// ===================================================================
// @ File Mention & / Skill Command Autocomplete
// ===================================================================
let mentionFiles = [];
let mentionSkills = [];
let mentionActive = false;
let mentionIdx = -1;
let mentionStart = -1;
let mentionTrigger = ''; // '@' or '/'
let mentionItems = [];   // current filtered items
let mentionQueryText = '';

async function loadMentionFiles() {
  if (!state.settings.workspace) return;
  try {
    const url = '/api/workspace/tree?workspace=' + encodeURIComponent(state.settings.workspace);
    const resp = await fetch(url);
    if (!resp.ok) return;
    const data = await resp.json();
    mentionFiles = flattenTree(data.tree, '');
  } catch(e) {}
}

function flattenTree(node, prefix) {
  if (!node || node.type !== 'directory') return [];
  let files = [];
  (node.children || []).forEach(child => {
    const path = prefix ? prefix + '/' + child.name : child.name;
    if (child.type === 'file') {
      files.push({name: child.name, path: path});
    } else if (child.type === 'directory') {
      files = files.concat(flattenTree(child, path));
    }
  });
  return files;
}

// Skills available for / commands
function refreshMentionSkills() {
  mentionSkills = (state.skills || []).filter(s => s.enabled).map(s => ({
    name: s.name,
    description: s.description,
  }));
}

function getMentionQuery() {
  const el = state.chatInput;
  const pos = el.selectionStart;
  const val = el.value;
  if (pos === 0) return null;
  // Walk backwards from cursor to find '@' or '/'
  let i = pos - 1;
  let found = null;
  while (i >= 0) {
    if (val[i] === '@') { found = '@'; break; }
    if (val[i] === '/') { found = '/'; break; }
    if (val[i] === ' ' || val[i] === '\n') { i--; continue; }
    break;
  }
  if (!found) return null;
  // For @: must be at word boundary
  if (found === '@' && i > 0 && !/\s/.test(val[i-1]) && val[i-1] !== '(' && val[i-1] !== '[') return null;
  // For /: must be at start of line
  if (found === '/' && i > 0 && val[i-1] !== '\n') return null;
  const query = val.slice(i + 1, pos);
  if (/[^\w.-]/.test(query)) return null;
  return {trigger: found, start: i, query};
}

function showMentionDropdown(items) {
  const dd = document.getElementById('mentionDropdown');
  if (!items.length) { dd.classList.remove('show'); mentionActive = false; return; }
  dd.innerHTML = items.map((f, i) => {
    if (mentionTrigger === '/') {
      return `<div class="mention-item${i === mentionIdx ? ' active' : ''}" data-index="${i}">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></span>
        <span class="name">${highlightMatch(f.name, mentionQueryText)}</span>
        <span class="path">${f.description || ''}</span>
      </div>`;
    }
    return `<div class="mention-item${i === mentionIdx ? ' active' : ''}" data-index="${i}">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
      <span class="name">${highlightMatch(f.name, mentionQueryText)}</span>
      <span class="path">${f.path}</span>
    </div>`;
  }).join('');
  dd.classList.add('show');
  mentionActive = true;
}

function highlightMatch(name, query) {
  if (!query) return escapeHtml(name);
  const idx = name.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return escapeHtml(name);
  return escapeHtml(name.slice(0, idx)) + '<span class="match">' + escapeHtml(name.slice(idx, idx + query.length)) + '</span>' + escapeHtml(name.slice(idx + query.length));
}

function handleMentionInput() {
  const m = getMentionQuery();
  if (!m) {
    document.getElementById('mentionDropdown').classList.remove('show');
    mentionActive = false;
    return;
  }
  mentionTrigger = m.trigger;
  mentionStart = m.start;
  mentionQueryText = m.query;
  mentionIdx = -1;

  const q = m.query.toLowerCase();

  if (m.trigger === '/') {
    refreshMentionSkills();
    if (!q) {
      mentionItems = mentionSkills.slice(0, 20);
    } else {
      mentionItems = mentionSkills.filter(s =>
        s.name.toLowerCase().includes(q)
      ).slice(0, 20);
    }
  } else {
    if (!q) {
      mentionItems = mentionFiles.slice(0, 20);
    } else {
      mentionItems = mentionFiles.filter(f =>
        f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)
      ).slice(0, 20);
    }
  }
  showMentionDropdown(mentionItems);
}

function applyMention(item) {
  const el = state.chatInput;
  const val = el.value;
  const before = val.slice(0, mentionStart);
  const after = val.slice(el.selectionStart);
  const insertion = mentionTrigger === '/' ? item.name : item.path;
  el.value = before + mentionTrigger + insertion + ' ';
  const newPos = (before + mentionTrigger + insertion + ' ').length;
  el.setSelectionRange(newPos, newPos);
  el.focus();
  el.dispatchEvent(new Event('input'));
  document.getElementById('mentionDropdown').classList.remove('show');
  mentionActive = false;
}

// Hook into input
state.chatInput.addEventListener('input', () => {
  handleMentionInput();
});

state.chatInput.addEventListener('keydown', (e) => {
  if (!mentionActive) return;
  const items = document.querySelectorAll('.mention-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    mentionIdx = Math.min(mentionIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === mentionIdx));
    const active = items[mentionIdx];
    if (active) active.scrollIntoView({block: 'nearest'});
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    mentionIdx = Math.max(mentionIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === mentionIdx));
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    if (mentionIdx >= 0 && mentionIdx < items.length) {
      e.preventDefault();
      if (mentionItems[mentionIdx]) applyMention(mentionItems[mentionIdx]);
    }
  } else if (e.key === 'Escape') {
    document.getElementById('mentionDropdown').classList.remove('show');
    mentionActive = false;
  }
});

// Click on mention item via delegation
document.getElementById('mentionDropdown').addEventListener('click', (e) => {
  const item = e.target.closest('.mention-item');
  if (!item) return;
  const idx = parseInt(item.dataset.index);
  if (mentionItems[idx]) applyMention(mentionItems[idx]);
});

// Load files when workspace changes
const origApplyWs = applyWorkspace;
applyWorkspace = function(selectedPath) {
  origApplyWs(selectedPath);
  loadMentionFiles();
};

// ===================================================================
// Markdown Renderer
// ===================================================================
// Configure marked once
if (typeof marked !== 'undefined' && marked.setOptions) {
  marked.setOptions({breaks: true, gfm: true});
} else if (typeof marked !== 'undefined' && marked.use) {
  marked.use({breaks: true, gfm: true});
}

function highlightCode(code, lang) {
  // Simple keyword highlighting for common languages (no external deps)
  const keywords = {
    python: ['def', 'class', 'if', 'elif', 'else', 'for', 'while', 'return', 'import', 'from',
             'try', 'except', 'finally', 'raise', 'with', 'as', 'in', 'not', 'and', 'or',
             'True', 'False', 'None', 'async', 'await', 'pass', 'break', 'continue', 'yield',
             'lambda', 'global', 'nonlocal', 'assert', 'del', 'print'],
    javascript: ['function', 'const', 'let', 'var', 'if', 'else', 'for', 'while', 'return',
                 'import', 'export', 'default', 'from', 'async', 'await', 'class', 'new',
                 'this', 'try', 'catch', 'throw', 'typeof', 'instanceof', 'true', 'false',
                 'null', 'undefined', 'switch', 'case', 'break', 'continue', 'yield'],
  };
  const langKeywords = keywords[lang] || keywords.python;
  // Escape HTML
  let html = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Strings (single/double quotes)
  html = html.replace(/(["'`])(?:(?!\1|\\).|\\.)*\1/g, '<span class="hljs-string">$&</span>');
  // Comments (# and //)
  html = html.replace(/(#.*)$/gm, '<span class="hljs-comment">$1</span>');
  html = html.replace(/(\/\/.*)$/gm, '<span class="hljs-comment">$1</span>');
  // Keywords
  const kwPattern = new RegExp('\\b(' + langKeywords.join('|') + ')\\b', 'g');
  html = html.replace(kwPattern, '<span class="hljs-keyword">$1</span>');
  // Numbers
  html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="hljs-number">$1</span>');
  return html;
}

function renderMarkdown(el, md) {
  if (!md) { el.innerHTML = ''; return; }
  if (typeof marked === 'undefined') {
    el.textContent = md;
    return;
  }

  try {
    el.innerHTML = marked.parse(md);
  } catch(e) {
    el.textContent = md;
    return;
  }

  // Apply syntax highlighting
  el.querySelectorAll('pre code').forEach(block => {
    const cls = block.className;
    const lang = cls.replace('language-', '').trim() || '';
    const raw = block.textContent || '';
    block.innerHTML = highlightCode(raw, lang);
  });
}

function renderMarkdownToHTML(md) {
  if (!md) return escapeHtml('');
  if (typeof marked === 'undefined') return escapeHtml(md);
  try {
    return marked.parse(md);
  } catch(e) {
    return escapeHtml(md);
  }
}

async function loadSessionList() {
  const container = document.getElementById('historyContainer');
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    const sessions = data.sessions || [];
    if (sessions.length === 0) {
      container.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text-muted);text-align:center;">No conversations yet</div>';
      return;
    }
    container.innerHTML = sessions.map(s => {
      const title = escapeHtml(s.title || 'Untitled');
      const wsp = escapeHtml((s.workspace || '').split('/').pop() || '');
      const date = formatDate(s.updated_at);
      return `<div class="history-item" data-sid="${s.id}" onclick="resumeSession('${s.id}')">
        <div class="history-title">${title}</div>
        <div class="history-meta">
          <span class="history-date">${date}</span>
          <span class="history-workspace">${wsp}</span>
        </div>
        <button class="history-delete" onclick="event.stopPropagation();deleteSession('${s.id}')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>`;
    }).join('');

    // Highlight active session
    if (state.sessionId) {
      const active = container.querySelector(`[data-sid="${state.sessionId}"]`);
      if (active) active.classList.add('active');
    }
  } catch(e) {
    container.innerHTML = '<div style="padding:16px;color:var(--error);font-size:13px;">Failed to load history</div>';
  }
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'Just now';
  if (diffMin < 60) return diffMin + 'm ago';
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + 'h ago';
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 7) return diffDay + 'd ago';
  return d.toLocaleDateString();
}

function resumeSession(sid) {
  if (state.ws) {
    state.ws.onclose = null;
    state.ws.onmessage = null;
    state.ws.close();
  }
  state._resumeSessionId = sid;
  state._skipBlankCheck = true;
  state._skipSettingsSync = true;
  state.messagesContainer.innerHTML = `
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3>Loading conversation...</h3>
    </div>`;
  state.emptyState = document.getElementById('emptyState');
  currentAssistantGroup = null;
  currentThinkingEl = null;
  currentTextEl = null;
  connectWS();
}

async function deleteSession(sid) {
  if (!confirm('Delete this conversation?')) return;
  try {
    await fetch('/api/sessions/' + sid, { method: 'DELETE' });
    loadSessionList();
    // If deleting the current session, reset to blank state and start new chat
    if (state.sessionId === sid) {
      startNewChat();
    }
  } catch(e) {}
}

function renderHistoryMessages(messages) {
  // Collect tool results by tool_use_id
  const toolResults = {};
  messages.forEach(m => {
    if (m.role === 'user' && Array.isArray(m.content)) {
      m.content.forEach(b => {
        if (b.type === 'tool_result' && b.tool_use_id) {
          toolResults[b.tool_use_id] = b.content || '';
        }
      });
    }
  });

  // Render messages with consecutive assistant messages merged into one group
  let currentGroup = null;
  let currentBubble = null;

  messages.forEach(m => {
    if (m.role === 'user') {
      if (typeof m.content === 'string') {
        addUserMessage(m.content);
      }
      // tool_result messages close the current assistant group
      if (Array.isArray(m.content) && m.content.some(b => b.type === 'tool_result')) {
        // Keep currentGroup open — next assistant message appends to it
      } else {
        currentGroup = null;
        currentBubble = null;
      }
    } else if (m.role === 'assistant') {
      if (!currentGroup) {
        currentGroup = document.createElement('div');
        currentGroup.className = 'message-group';
        const msgEl = document.createElement('div');
        msgEl.className = 'message assistant';
        msgEl.innerHTML = '<div class="message-avatar">A</div>';
        currentBubble = document.createElement('div');
        currentBubble.className = 'bubble';
        msgEl.appendChild(currentBubble);
        currentGroup.appendChild(msgEl);
        state.messagesContainer.appendChild(currentGroup);
      }
      appendHistoryBlocks(currentBubble, m.content, toolResults);
    }
  });
}

function appendHistoryBlocks(bubble, contentBlocks, toolResults) {
  if (!Array.isArray(contentBlocks)) {
    contentBlocks = [{"type": "text", "text": String(contentBlocks)}];
  }

  contentBlocks.forEach(block => {
    if (block.type === 'thinking') {
      const thinkEl = document.createElement('div');
      thinkEl.className = 'thinking-block collapsed';
      thinkEl.innerHTML = '<div class="thinking-header"><span class="thinking-toggle">▶</span> 思考过程</div>';
      const content = document.createElement('div');
      content.className = 'thinking-content';
      block.thinking.split('\n').forEach(line => {
        const span = document.createElement('span');
        span.textContent = line + '\n';
        content.appendChild(span);
      });
      thinkEl.appendChild(content);
      thinkEl.addEventListener('click', function () {
        this.classList.toggle('collapsed');
        this.classList.toggle('expanded');
        const toggle = this.querySelector('.thinking-toggle');
        if (toggle) toggle.textContent = this.classList.contains('collapsed') ? '▶' : '▼';
      });
      bubble.appendChild(thinkEl);
    } else if (block.type === 'text') {
      const textDiv = document.createElement('div');
      textDiv.className = 'text-block';
      renderMarkdown(textDiv, block.text);
      bubble.appendChild(textDiv);
    } else if (block.type === 'tool_use') {
      const isBuiltin = BUILTIN_TOOLS.has(block.name);
      const typeClass = isBuiltin ? 'type-tool' : 'type-skill';
      const iconClass = isBuiltin ? 'tool-icon' : 'skill-icon';
      const badgeClass = isBuiltin ? 'builtin' : 'skill';
      const badgeText = isBuiltin ? 'TOOL' : 'SKILL';
      const svgIcon = isBuiltin ? (TOOL_ICONS[block.name] || TOOL_ICONS.bash) : SKILL_ICON;

      const args = block.input || {};
      const entries = Object.entries(args).filter(([k]) => k !== '_workspace');
      let argsHtml = '';
      if (entries.length > 0) {
        argsHtml = entries.map(([k, v]) => {
          let valStr = typeof v === 'string' ? v : JSON.stringify(v);
          if (valStr.length > 120) valStr = valStr.slice(0, 120) + '...';
          return `<span class="tool-arg-key">${escapeHtml(k)}</span><span class="tool-arg-sep"> = </span><span class="tool-arg-value">${escapeHtml(valStr)}</span>`;
        }).join('<br>');
      }
      const hasBody = argsHtml.length > 0;

      const result = toolResults[block.id] || '';
      const hasResult = result.length > 0;

      const blockEl = document.createElement('div');
      blockEl.className = `tool-call-block ${typeClass}${hasBody || hasResult ? ' has-body' : ''}`;
      blockEl.innerHTML = `
        <div class="tool-call-header" onclick="this.parentElement.querySelectorAll('.collapsible-body').forEach(b=>b.classList.toggle('open'))">
          <span class="tool-call-icon ${iconClass}">${svgIcon}</span>
          <span class="tool-call-badge ${badgeClass}">${badgeText}</span>
          <span class="tool-call-name">${escapeHtml(block.name)}</span>
          <span class="tool-call-status"><span style="color:var(--success)">&#10003;</span></span>
        </div>
        ${hasBody ? `<div class="collapsible-body"><div class="tool-call-args"><pre>${argsHtml}</pre></div></div>` : ''}
        ${hasResult ? `<div class="collapsible-body"><div class="tool-result-block success"><pre>${escapeHtml(result)}</pre></div></div>` : ''}
      `;
      bubble.appendChild(blockEl);
    }
  });
}

function startNewChat() {
  if (state.ws) {
    state.ws.onclose = null;
    state.ws.onmessage = null;
    state.ws.close();
  }
  state._resumeSessionId = null;
  state.sessionId = null;
  state._skipBlankCheck = true;
  state.messagesContainer.innerHTML = `
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3>Start a conversation</h3>
      <p>Send a message and the agent will help you with code.</p>
    </div>`;
  state.emptyState = document.getElementById('emptyState');
  currentAssistantGroup = null;
  currentThinkingEl = null;
  currentTextEl = null;
  connectWS();
}

document.getElementById('newChatBtn').addEventListener('click', startNewChat);

// ===================================================================
// Init
// ===================================================================
loadFileTree();
connectWS();
updateInputState();

// Scroll detection: pause auto-scroll when user scrolls up
const mc = state.messagesContainer;
mc.addEventListener('scroll', () => {
  const distFromBottom = mc.scrollHeight - mc.scrollTop - mc.clientHeight;
  if (distFromBottom > 100) {
    state.userScrolledUp = true;
    document.getElementById('scrollBottomBtn').style.display = 'flex';
  } else {
    state.userScrolledUp = false;
    document.getElementById('scrollBottomBtn').style.display = 'none';
  }
});

// Ping every 30s to keep connection alive
setInterval(() => {
  if (state.connected) sendWS({type: 'ping'});
}, 30000);
</script>
